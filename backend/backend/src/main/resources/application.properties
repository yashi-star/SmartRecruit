spring.application.name=backend
# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/interview_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA — auto-creates tables from your entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File uploads (resumes)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server
server.port=8080

# JWT config ? in production this secret should come from environment variables, never hardcode it
jwt.secret=your-very-long-secret-key-at-least-256-bits-long-replace-this
jwt.expiration=86400000
# 86400000 milliseconds = 24 hours